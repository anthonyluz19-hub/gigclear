    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "GigClear",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "description": "Free calculator for Uber, DoorDash, Lyft and other 1099 gig workers. Computes real net income, IRS mileage deduction and self-employment tax estimate.",
      "url": "https://gigclear.vercel.app/",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "inLanguage": ["en", "es"],
      "audience": {
        "@type": "Audience",
        "audienceType": "Gig economy workers (rideshare and delivery drivers)"
      }
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Does this replace an accountant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. GigClear gives you accurate estimates of your net income and self-employment tax using the same numbers your accountant would use. For filing your annual return — especially if you work in multiple states or have other income — talk to a tax pro."
          }
        },
        {
          "@type": "Question",
          "name": "Are my numbers stored on your server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Everything stays on your phone or browser (localStorage). We don't have an account system, so there's nothing for us to store, leak or sell."
          }
        },
        {
          "@type": "Question",
          "name": "How is the self-employment tax calculated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "15.3% (12.4% Social Security + 2.9% Medicare) on your net income (gross minus deductible expenses). GigClear applies it automatically once you enter your numbers."
          }
        },
        {
          "@type": "Question",
          "name": "Which platforms does it work for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Any gig platform where you receive a 1099 — Uber, Lyft, DoorDash, Instacart, Grubhub, Amazon Flex, Shipt, Roadie and more. The math is the same."
          }
        },
        {
          "@type": "Question",
          "name": "Does it work in every US state?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The federal SE tax (15.3%) and the IRS standard mileage deduction ($0.70/mi for 2025) are the same in every state. State income tax varies — GigClear uses a 20% combined estimate as a rule of thumb. For your specific state, check with a tax pro."
          }
        },
        {
          "@type": "Question",
          "name": "Is it really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, forever. No ads, no signup, no upsell. If we ever launch a paid version with extras (sync between devices, advanced reports), the calculator stays free."
          }
        }
      ]
    }
    </script>
